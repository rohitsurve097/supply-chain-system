apiVersion: v1
kind: ConfigMap
metadata:
  name: supply-chain-config
  namespace: supply-chain
data:
  ENV: "production"
  LOG_LEVEL: "INFO"
  AWS_REGION: "ap-south-1"

  # For EKS production, leave AWS_ENDPOINT_URL empty to use AWS-managed endpoints.
  AWS_ENDPOINT_URL: ""

  ORDER_SQS_QUEUE_URL: "https://sqs.ap-south-1.amazonaws.com/123456789012/order-events"
  INVENTORY_SQS_QUEUE_URL: "https://sqs.ap-south-1.amazonaws.com/123456789012/order-events"
  INVENTORY_EVENT_QUEUE_URL: "https://sqs.ap-south-1.amazonaws.com/123456789012/inventory-events"
  SHIPMENT_SQS_QUEUE_URL: "https://sqs.ap-south-1.amazonaws.com/123456789012/inventory-events"
