apiVersion: v1
kind: Secret
metadata:
  name: supply-chain-secrets
  namespace: supply-chain
type: Opaque
stringData:
  # Replace with real values or inject via External Secrets / Secrets Manager integration.
  ORDER_SERVICE_DB_URL: "postgresql+asyncpg://<user>:<password>@<rds-host>:5432/<db>"
  INVENTORY_SERVICE_DB_URL: "postgresql+asyncpg://<user>:<password>@<rds-host>:5432/<db>"
  SHIPMENT_SERVICE_DB_URL: "postgresql+asyncpg://<user>:<password>@<rds-host>:5432/<db>"

  AWS_ACCESS_KEY_ID: "<access-key-id>"
  AWS_SECRET_ACCESS_KEY: "<secret-access-key>"
