apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipment-service
  namespace: supply-chain
  labels:
    app: shipment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shipment-service
  template:
    metadata:
      labels:
        app: shipment-service
    spec:
      enableServiceLinks: false
      containers:
        - name: shipment-service
          image: ghcr.io/your-org/supply-chain-shipment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
              name: http
          envFrom:
            - configMapRef:
                name: supply-chain-config
            - secretRef:
                name: supply-chain-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
